version: '3.9'

services:

  api:
    build: .
    container_name: minha_api
    ports:
      - "5107:8080"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql_api
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: minhaapi
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: